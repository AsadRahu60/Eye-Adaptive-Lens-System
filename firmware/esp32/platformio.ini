; ──────────────────────────────────────────────────────────────────────────────
; Eye Adaptive Lens System — PlatformIO Project Configuration
;
; Usage:
;   pio run -e esp32s3          # build
;   pio run -e esp32s3 -t upload # flash via USB
;   pio device monitor          # serial console (115200 baud)
;
; Install PlatformIO:  pip install platformio
; ──────────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = esp32s3

; ── Shared settings ───────────────────────────────────────────────────────────
[env]
framework   = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3      ; INFO-level Serial debug output
    -DBOARD_HAS_PSRAM         ; enable PSRAM on S3 boards that have it

; ── ESP32-S3 DevKit (real hardware) ──────────────────────────────────────────
[env:esp32s3]
platform = espressif32 @ ^6.7.0
board    = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DMOCK_SENSORS=0          ; use real sensor hardware
lib_deps =
    bblanchon/ArduinoJson        @ ^7.1.0
    adafruit/Adafruit_VL53L0X    @ ^1.2.4
    claws/BH1750                 @ ^1.3.0
    adafruit/Adafruit MPU6050    @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

; ── ESP32-S3 mock build (CI — no real sensors) ────────────────────────────────
[env:esp32s3_mock]
platform = espressif32 @ ^6.7.0
board    = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DMOCK_SENSORS=1          ; simulated sensors — no hardware required
lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0
; Note: sensor libraries are NOT needed in mock mode
